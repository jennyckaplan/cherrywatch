version: "2.35.1"
services:
  cherrywatch:
    container_name: cherrywatch
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/app
    environment:
      - ACCOUNT_SID=${ACCOUNT_SID}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - TWILIO_NUMBER=${TWILIO_NUMBER}
      - RECIPIENTS=${RECIPIENTS}
      - LOG_LEVEL=debug
