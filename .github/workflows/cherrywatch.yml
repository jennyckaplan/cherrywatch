name: Notifies users of changes to the cherry blossom map
on:
  workflow_dispatch:
  schedule:
    - cron: "14 12,20 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACCOUNT_SID: ${{ secrets.ACCOUNT_SID}}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      RECIPIENTS: ${{ secrets.RECIPIENTS }}
      TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install dependencies
        run: yarn

      - name: Generate snapshot
        id: snapshot_test
        continue-on-error: true
        run: |
          set +e
          yarn test --runInBand 2>&1 | tee test-output.log
          test_exit_code=${PIPESTATUS[0]}
          set -e

          echo "exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          if [ "$test_exit_code" -eq 0 ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          elif rg -q "Expected image to match or be a close match to snapshot" test-output.log; then
            echo "status=snapshot_diff" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on test infrastructure errors
        if: steps.snapshot_test.outputs.status == 'error'
        run: |
          echo "Snapshot test failed for a reason other than an image diff."
          exit 1

      - name: Update image snapshots on failure
        if: steps.snapshot_test.outputs.status == 'snapshot_diff'
        run: yarn test -u --runInBand

      - name: Commit new files
        if: steps.snapshot_test.outputs.status == 'snapshot_diff'
        run: |
          git config --global user.name 'Jennifer Kaplan'
          git config --global user.email 'jenniferckaplan@gmail.com'
          git add .
          git commit -am "updated images" --allow-empty
          git push --force origin main

      - name: Notify users of updates to map
        if: steps.snapshot_test.outputs.status == 'snapshot_diff'
        uses: ./docker
